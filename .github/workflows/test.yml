name: test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1.24.0
        with:
          otp-version: "28"
          gleam-version: "1.16.0"
          rebar3-version: "3"
          # elixir-version: "1"
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: gleam deps download
      - run: gleam test
      - run: gleam format --check src test dev
